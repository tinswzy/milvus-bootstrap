# Editable compatibility constraints. severity: hard=block / soft=warn-only.
# source: confident | best-effort | user-table.
# operator/helm/k8s ↔ milvus: min/max intentionally EMPTY until the authoritative
# table is provided. Empty bounds => unknown => WARN/info, never a hard block.
# (milvus ↔ kafka/pulsar/woodpecker hard rules live in compat.py MQ_OPTIONS, not here.)
constraints:
  - component: milvus-operator
    requires: milvus
    rule: "milvus 2.6.x 需要 operator 版本区间"
    milvus_range: ">=2.6.0,<3.0.0"
    min: ""
    max: ""
    severity: soft
    source: user-table
    reason: ""
  - component: milvus-operator
    requires: milvus
    rule: "milvus 3.0.x 需要 operator 版本区间"
    milvus_range: ">=3.0.0"
    min: ""
    max: ""
    severity: soft
    source: user-table
    reason: ""
  - component: milvus-helm
    requires: milvus
    rule: "milvus-helm 与 milvus 版本对应"
    milvus_range: ">=2.6.0"
    min: ""
    max: ""
    severity: soft
    source: user-table
    reason: ""
  - component: k8s
    requires: milvus
    rule: "k8s 版本下限（≥1.16）"
    milvus_range: ""
    min: "1.16.0"
    max: ""
    severity: soft
    source: docs-tested
    reason: "prerequisite-helm: Kubernetes 1.16+"
  # --- SOFT semver floors (docs-tested; below => WARN, never block) ---
  - component: etcd
    requires: milvus
    rule: "etcd 版本下限（docs 测试 3.5.0，operator 默认 3.5.25）"
    milvus_range: ""
    min: "3.5.0"
    max: ""
    severity: soft
    source: docs-tested
    reason: "milvus.io/docs prerequisite: etcd 3.5.x"
  - component: pulsar
    requires: milvus
    rule: "pulsar 版本下限（docs 测试 2.8.2，operator 默认 3.0.7，2.x 亦可）"
    milvus_range: ""
    min: "2.8.2"
    max: ""
    severity: soft
    source: docs-tested
    reason: "milvus.io/docs prerequisite: pulsar 2.8.2"
  - component: helm
    requires: milvus
    rule: "Helm 版本下限（≥3.0；用 pulsar-v3 chart 需 ≥3.14）"
    milvus_range: ""
    min: "3.0.0"
    max: ""
    severity: soft
    source: docs-tested
    reason: "prerequisite-helm: Helm 3.0.0+"
  # SOFT here (matrix has no per-instance mq context); HARD is enforced in
  # gate("install") when the chosen mq is a woodpecker option (see gate).
  - component: minio
    requires: milvus
    rule: "woodpecker+minio 需 MinIO ≥ 2024-12-18（S3 Conditional Write）"
    milvus_range: ">=2.6.0"
    min: "RELEASE.2024-12-18T13-15-44Z"
    max: ""
    severity: soft
    source: docs-tested
    reason: "use-woodpecker: self-hosted MinIO RELEASE.2024-12-18T13-15-44Z+"
    kind: minio-release
# NOTE: "MQ choice is frozen during an upgrade to milvus 2.6.9" is documented but
# intentionally NOT enforced as a gate rule here.
upgrade_paths:
  - target_min: "2.6.10"
    requires_current_min: "2.5.16"
    reason: "升级到 milvus 2.6.10+ 前需先在 2.5.16+"
  - target_min: "3.0.0"
    requires_current_min: "2.5.16"
    reason: "升级到 milvus 3.0+ 前需先在 2.5.16+ 并启用 mixCoordinator"
