# Kafka — installed as an external MQ for Milvus. See phase1-plan.html.
# NOTE: the "official" path is the Strimzi operator (Kafka CR); that needs a
# KafkaDriver to build the Strimzi Kafka + KafkaNodePool CRs (TODO). For now the
# default is bitnami helm, which is simpler and gives milvus a brokerList.
kind: kafka
state_class: authoritative

detect:
  image_match: ["kafka"]
  ports: [9092]
  crd: Kafka

install_methods:
  - id: bitnami-helm
    platform: k8s
    default: true
    kind: helm
    chart: bitnami/kafka
    params:                                  # 单机最小拓扑（KRaft 单节点）；多副本/HA 需多节点集群
      # Bitnami moved versioned free images docker.io/bitnami/* -> docker.io/bitnamilegacy/*
      # (Aug-2025); the chart default bitnami/kafka now 404s, so pin the legacy repo.
      image: { repository: bitnamilegacy/kafka }
      controller: { replicaCount: 1, resourcesPreset: small }
      # Milvus connects to the CLIENT listener WITHOUT auth. Bitnami kafka 32.x
      # defaults listeners.client.protocol=SASL_PLAINTEXT (auto-gen SCRAM/PLAIN
      # creds) => a plaintext milvus client fails => MsgStreamNotReady. PLAINTEXT
      # drops auth on :9092 (interbroker/controller stay SASL, they're internal).
      listeners: { client: { protocol: PLAINTEXT } }
  - id: external
    platform: k8s
    kind: external
  - id: docker-compose
    platform: docker
    kind: compose

health:
  workload_ready: "sts.readyReplicas == replicas"
  cluster_check: ":9092 reachable"

scale_rules:
  step: rolling

connect:
  milvus_values: "externalKafka.brokerList"
