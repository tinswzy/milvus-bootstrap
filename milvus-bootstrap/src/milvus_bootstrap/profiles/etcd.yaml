# etcd — drives all engines. See prototype/phase1-plan.html (etcd task card).
kind: etcd
state_class: authoritative          # disk = Milvus metadata; cluster can't be wiped & rebuilt

detect:
  image_match: ["etcd"]
  ports: [2379, 2380]
  helm_chart: "etcd-*"
  exclude_labels:                   # HARD guardrail: never touch control-plane etcd
    tier: control-plane

install_methods:
  - id: bitnami-helm                # default: same chart/image milvus uses today
    platform: k8s
    default: true
    kind: helm
    chart: bitnami/etcd
    params:
      # Bitnami moved versioned free images docker.io/bitnami/* -> docker.io/bitnamilegacy/*
      # (Aug-2025); the chart default bitnami/etcd now 404s, so pin the legacy repo.
      image: { repository: bitnamilegacy/etcd }
      replicaCount: 3               # odd for quorum
      persistence: { size: 10Gi }
      # Milvus connects to etcd WITHOUT auth. The bitnami etcd chart key is
      # `auth.rbac.create` (NOT `enabled` — that key doesn't exist and is silently
      # ignored, leaving the chart default create=true => RBAC on => milvus operator's
      # unauthenticated etcd probe fails with EtcdNotReady). create=false =>
      # ALLOW_NONE_AUTHENTICATION=yes, no root user. NOTE: auth-enabled state lives in
      # etcd's data dir, so flipping this on an existing install needs a PVC wipe.
      auth: { rbac: { create: false } }
  - id: raw-statefulset
    platform: k8s
    kind: manifest
  - id: docker-compose
    platform: docker
    kind: compose
  - id: external
    platform: k8s
    kind: external

health:
  workload_ready: "sts.readyReplicas == replicas"
  cluster_check: "etcdctl endpoint health --cluster (quorum)"

scale_rules:
  replicas: odd-only
  step: one-at-a-time
  scale_down: "preStop etcdctl member remove"
  immutable_fields: ["volumeClaimTemplates"]

connect:
  milvus_values: "externalEtcd.endpoints"
